<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ytudl-web | YouTube MP3 다운로더</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="search-header">
    <div class="logo">
      <span class="logo-icon">&#9654;</span>
      <span class="logo-text">ytudl-web</span>
    </div>
    <form class="search-form" id="searchForm">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="유튜브 음악 제목 또는 아티스트 검색..."
        autocomplete="off"
        required
      />
      <button type="submit" class="search-btn">검색</button>
    </form>
  </header>

  <main class="main-content">
    <div id="statusMsg" class="status-msg hidden"></div>
    <div id="resultsGrid" class="results-grid"></div>
  </main>

  <template id="cardTemplate">
    <div class="card">
      <div class="card-thumb">
        <img class="thumb-img" src="" alt="" />
        <span class="duration-badge"></span>
      </div>
      <div class="card-body">
        <h3 class="card-title"></h3>
        <p class="card-channel"></p>
        <div class="card-footer">
          <span class="card-views"></span>
          <button class="dl-btn">
            <span class="dl-icon">&#8595;</span> MP3 다운로드
          </button>
        </div>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
